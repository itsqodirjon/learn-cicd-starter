name: ci

on:
  push:
    branches: [main, addtests]
  pull_request:
    branches: [main]

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"
      - run: go test -cover ./...

  style:
    name: Style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"
      - run: |
          if [ -n "$(go fmt ./...)" ]; then
            echo "Code is not formatted properly"
            exit 1
          fi
